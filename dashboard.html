<!DOCTYPE html>
<html>
<head>
    <title>Gym Member Dashboard</title>

    <style>
        body{
            font-family: Arial;
            margin:40px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        th{
            background:#4CAF50;
            color:white;
        }
    </style>
</head>

<body>

<h2>Gym Member Dashboard</h2>

<table id="gymMembersTable">

<thead>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Contact</th>
    <th>Plan</th>
    <th>Age</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

<script>

async function loadGymMembers(){

const response = await fetch("https://titan-fitness-project.onrender.com/gymMembers");

const gymMembers = await response.json();

const tbody = document.querySelector("tbody");

gymMembers.forEach(gymMember=>{

tbody.innerHTML += `
<tr>

<td>${gymMember.id}</td>

<td>${gymMember.name}</td>

<td>${gymMember.email}</td>

<td>${gymMember.contact}</td>

<td>${gymMember.plan}</td>

<td>${gymMember.age}</td>

</tr>
`;

});

}

loadGymMembers();

</script>

</body>
</html>
