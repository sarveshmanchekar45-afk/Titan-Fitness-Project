<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titan Fitness | Register</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="page-header">
    <div class="container nav-bar">
      <a class="nav-logo" href="/">Titan Fitness</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main class="container form-page">
    <section class="form-card form-card-large">
      <h1>Create Your Titan Fitness Account</h1>
      <p>Sign up now for full access to classes, trainers, and member benefits.</p>
      <form action="thankyou.html" method="POST" id="registerForm">
        <div class="form-grid">
          <div class="form-field">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="First Middle Last" required />
          </div>
          <div class="form-field">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Email" required />
          </div>
          <div class="form-field">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="Age" required />
          </div>
          <div class="form-field">
            <label for="contact">Phone Number</label>
            <input
    type="tel"
    id="contact"
    name="contact"
    maxlength="10"
    pattern="[0-9]{10}"
    inputmode="numeric"
    placeholder="Enter 10-digit mobile number"
    required
    oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10)"
>
          </div>
          <div class="form-field">
            <label for="plan">Choose a Plan</label>
            <select id="plan" name="plan"  required>
              <option value="Basic">Basic</option>
              <option value="Standard">Standard</option>
              <option value="Premium">Premium</option>
            </select>
          </div>
          <div class="form-field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required />
          </div>
          <div class="form-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6" />
          </div>
          <div class="form-field">
             <label for="confirmPassword">Re-enter Password:</label>
           <input type="password" id="confirmPassword" name="confirmPassword" required>
          </div>
        </div>
        <button class="btn btn-primary btn-block" onclick="window.location.href='thankyou.html'" type="submit">Register</button>
      </form>
<script>

document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault();

const gymMember = {

name: document.getElementById("fullName").value,

email: document.getElementById("email").value,

contact: document.getElementById("contact").value,

plan: document.getElementById("plan").value,

age: document.getElementById("age").value

};

const response = await fetch("https://titan-fitness-project.onrender.com/gymMembers",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(gymMember)

});

const result = await response.text();

alert(result);

});

</script>
<script>
        function validatePassword() {
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirmPassword").value;
            let message = document.getElementById("message");

            if (password !== confirmPassword) {
                message.textContent = "Passwords do not match!";
                return false; // Prevent form submission
            }

            message.textContent = "";
            alert("Registration successful!");
            return true;
        }
    </script>

      <p class="text-center">Already a member? <a href="login.html">Login here</a></p>
      <p class="error-message" id="errorMessage"></p>
    </section>
  </main>
</body>
</html>
